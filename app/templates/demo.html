{% extends "base.html" %}

{% block content %}

<div class="demo-header">
  <h2 class="demo-title">🌺 Your Personal Hormone Forecast</h2>
  <p class="demo-sub">Fill in a few details and let Hormona AI craft your personalised wellness forecast.</p>
</div>

<form id="forecastForm">

  <div class="form-row">
    <div class="form-group">
      <label>Last Period Date</label>
      <input type="date" id="last_period">
    </div>
    <div class="form-group">
      <label>Cycle Length (days)</label>
      <input type="number" id="cycle_length" value="28" min="21" max="35">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>How are you feeling today?</label>
      <select id="current_mood">
        <option value="Normal">😐 Normal</option>
        <option value="Happy">😊 Happy</option>
        <option value="Energetic">⚡ Energetic</option>
        <option value="Calm">😌 Calm</option>
        <option value="Anxious">😰 Anxious</option>
        <option value="Sad">😢 Sad</option>
        <option value="Irritable">😤 Irritable</option>
        <option value="Fatigued">😴 Fatigued</option>
      </select>
    </div>
    <div class="form-group">
      <label>Yesterday's sleep (hours)</label>
      <input type="number" id="sleep_hours" value="8" min="2" max="12" step="0.5">
    </div>
  </div>

  <button type="submit">Generate Forecast</button>

</form>

<!-- Today's insight card -->
<div id="todayCard" class="result-card hidden"></div>

<!-- Tomorrow's mood prediction card -->
<div id="tomorrowCard" class="tomorrow-card hidden"></div>

<!-- 7-day forecast chart -->
<div id="chartSection" class="hidden">
  <h3>7-Day Energy &amp; Mood Forecast</h3>
  <canvas id="energyChart"></canvas>
  <div id="moodLegend" class="mood-legend"></div>
</div>

<script src="/static/js/app.js"></script>

{% endblock %}
